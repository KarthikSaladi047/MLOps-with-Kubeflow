name: Build, Push, and Update Manifests

on:
  push:
    branches:
      - UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mlops-ui

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout UI Branch
        uses: actions/checkout@v4
        with:
          ref: UI

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Tag and Lowercase Repo Name
        id: vars
        run: |
          # 1. Get the short SHA
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          
          # 2. Force the GitHub repository string to lowercase
          LOWER_REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "lower_repo=$LOWER_REPO" >> $GITHUB_OUTPUT

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Use the newly lowercased repository string here!
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.lower_repo }}/mlops-ui:${{ steps.vars.outputs.sha_short }}

      - name: Checkout ArgoCD Branch
        uses: actions/checkout@v4
        with:
          ref: ArgoCD 
          path: argocd-branch 

      - name: Update Kubernetes Manifests
        run: |
          cd argocd-branch/UI
          
          # Construct the exact image name we just pushed
          NEW_IMAGE="${{ env.REGISTRY }}/${{ steps.vars.outputs.lower_repo }}/mlops-ui:${{ steps.vars.outputs.sha_short }}"
          
          # Replace it in the YAML
          sed -i "s|image: ghcr.io/.*|image: ${NEW_IMAGE}|g" k8s-ui-backend.yaml
          
          echo "Updated k8s-ui-backend.yaml to use image: $NEW_IMAGE"

      - name: Commit and Push Changes to ArgoCD Branch
        run: |
          cd argocd-branch
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add UI/k8s-ui-backend.yaml
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "GitOps: Update UI image to ${{ steps.vars.outputs.sha_short }}"
            git push origin ArgoCD
          else
            echo "No changes to commit."
          fi