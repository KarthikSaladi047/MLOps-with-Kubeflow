---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: infra-credentials
  namespace: kubeflow
spec:
  encryptedData:
    AWS_ACCESS_KEY_ID: 
    AWS_DEFAULT_REGION: 
    AWS_ENDPOINT_URL: 
    AWS_SECRET_ACCESS_KEY: 
    GIT_REPO_URL: 
    GITHUB_TOKEN: 
    MLFLOW_TRACKING_URI: 
  template:
    metadata:
      name: infra-credentials
      namespace: kubeflow
    type: Opaque
