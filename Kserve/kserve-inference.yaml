apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: huggingface-classifier
  namespace: default
spec:
  predictor:
    nodeSelector:
      node-role.kubernetes.io/apps: "true"
    tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "apps"
        effect: "NoSchedule"
    serviceAccountName: kserve-sa
    model:
      modelFormat:
        name: mlflow
      storageUri: s3://mlflow-artifacts/1/a81810ae2fe843ddadd506fbfa874ce0/artifacts/model
    canaryTrafficPercent: 10
    canary:
      modelFormat:
        name: mlflow
      storageUri: s3://mlflow-artifacts/1/a81810ae2fe843ddadd506fbfa874ce0/artifacts/model